name: Validate PR title

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate:
    name: Validate PR title follows Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            build
            ci
            perf
            style
          requireScope: false
          subjectPattern: ^[^A-Z].+$
          subjectPatternError: |
            The subject (text after the colon) must start with a lowercase letter.
            Example: "feat: add favorites sync" not "feat: Add favorites sync".
          wip: true
