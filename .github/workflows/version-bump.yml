name: Release Tagger

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Tag and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    # Avoid recursion if a release-tag commit is ever introduced later.
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Determine bump from commit message
        id: decide
        run: |
          set -euo pipefail

          SUBJECT=$(git log -1 --pretty=%s)
          BODY=$(git log -1 --pretty=%b)
          echo "Commit subject: $SUBJECT"

          # Conventional Commits: type(scope)?!?: subject
          if ! echo "$SUBJECT" | grep -qE '^(feat|fix|docs|chore|refactor|test|build|ci|perf|style)(\([^)]+\))?!?: '; then
            echo "Commit subject does not match Conventional Commits; skipping bump."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TYPE=$(echo "$SUBJECT" | sed -E 's/^([a-z]+).*/\1/')
          BANG=$(echo "$SUBJECT" | grep -oE '^[a-z]+(\([^)]+\))?!' || true)

          if [ -n "$BANG" ] || echo "$BODY" | grep -q 'BREAKING CHANGE:'; then
            BUMP=major
          elif [ "$TYPE" = "feat" ]; then
            BUMP=minor
          elif [ "$TYPE" = "fix" ] || [ "$TYPE" = "perf" ]; then
            BUMP=patch
          else
            BUMP=none
          fi

          echo "Decided bump: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Compute next version from tags
        id: version
        if: steps.decide.outputs.bump != 'none'
        run: |
          set -euo pipefail

          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST_TAG#v}"
          fi
          echo "Current version: $CURRENT"

          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Latest version '$CURRENT' is not semver (x.y.z)" >&2
            exit 1
          fi

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ steps.decide.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.decide.outputs.bump != 'none'
        run: |
          set -euo pipefail

          NEW="${{ steps.version.outputs.new }}"
          TAG="v${NEW}"

          for attempt in 1 2 3; do
            git fetch --tags origin

            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "Tag ${TAG} already exists; nothing to do."
              exit 0
            fi

            git tag "${TAG}"
            if git push origin "${TAG}"; then
              echo "Pushed ${TAG} on attempt $attempt"
              exit 0
            fi

            echo "Tag push failed on attempt $attempt; retrying"
            git tag -d "${TAG}" || true
            sleep "$attempt"
          done
          echo "Tag push failed after 3 attempts" >&2
          exit 1

      - name: Publish GitHub release
        if: steps.decide.outputs.bump != 'none'
        run: |
          gh release create "v${{ steps.version.outputs.new }}" \
            --title "v${{ steps.version.outputs.new }}" \
            --generate-notes
