name: Version bump

on:
  push:
    branches: [main]

jobs:
  bump:
    name: Bump MARKETING_VERSION, tag, and release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Parse PR title and decide bump
        id: decide
        run: |
          set -euo pipefail

          SUBJECT=$(git log -1 --pretty=%s)
          BODY=$(git log -1 --pretty=%b)
          echo "Commit subject: $SUBJECT"

          # Conventional Commits regex: type(scope)?!?: subject
          if ! echo "$SUBJECT" | grep -qE '^(feat|fix|docs|chore|refactor|test|build|ci|perf|style)(\([^)]+\))?!?: '; then
            echo "Commit subject does not match Conventional Commits; skipping bump."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TYPE=$(echo "$SUBJECT" | sed -E 's/^([a-z]+).*/\1/')
          BANG=$(echo "$SUBJECT" | grep -oE '^[a-z]+(\([^)]+\))?!' || true)

          if [ -n "$BANG" ] || echo "$BODY" | grep -q 'BREAKING CHANGE:'; then
            BUMP=major
          elif [ "$TYPE" = "feat" ]; then
            BUMP=minor
          elif [ "$TYPE" = "fix" ] || [ "$TYPE" = "perf" ]; then
            BUMP=patch
          else
            BUMP=none
          fi

          echo "Decided bump: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        id: version
        if: steps.decide.outputs.bump != 'none'
        run: |
          set -euo pipefail

          CURRENT=$(grep -E '^MARKETING_VERSION = ' Config.xcconfig | sed -E 's/^MARKETING_VERSION = //')
          echo "Current MARKETING_VERSION: $CURRENT"

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ steps.decide.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "New MARKETING_VERSION: $NEW"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Edit Config.xcconfig
        if: steps.decide.outputs.bump != 'none'
        run: |
          set -euo pipefail
          sed -i "s|^MARKETING_VERSION = .*|MARKETING_VERSION = ${{ steps.version.outputs.new }}|" Config.xcconfig

          # Safety: exactly one line must have changed.
          CHANGED=$(git diff --numstat Config.xcconfig | awk '{print $1+$2}')
          if [ "$CHANGED" != "2" ]; then
            echo "Expected exactly 2 line changes (1 deletion + 1 insertion) in Config.xcconfig, got $CHANGED" >&2
            git diff Config.xcconfig
            exit 1
          fi

      - name: Commit, tag, and push (with retry)
        if: steps.decide.outputs.bump != 'none'
        run: |
          set -euo pipefail

          NEW="${{ steps.version.outputs.new }}"
          git add Config.xcconfig
          git commit -m "chore: release v${NEW} [skip ci]"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed main on attempt $attempt"
              git tag "v${NEW}"
              git push origin "v${NEW}"
              exit 0
            fi
            echo "Push failed on attempt $attempt; rebasing and retrying"
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts" >&2
          exit 1

      - name: Create GitHub Release
        if: steps.decide.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.new }}" \
            --title "v${{ steps.version.outputs.new }}" \
            --generate-notes
